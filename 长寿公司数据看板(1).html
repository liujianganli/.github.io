<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重庆长寿公司看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --blue-dark: #0d2b5e;
    --blue-mid: #1a5faa;
    --blue-light: #3b8cde;
    --blue-pale: #e8f2fc;
    --orange: #f47b20;
    --orange-light: #ffb347;
    --orange-pale: #fff4e8;
    --white: #ffffff;
    --gray-1: #f5f7fa;
    --gray-2: #e9ecef;
    --gray-3: #adb5bd;
    --text-dark: #1a2332;
    --text-mid: #4a5568;
    --text-light: #718096;
    --card-shadow: 0 4px 20px rgba(13,43,94,0.10);
    --green: #27ae60;
    --red: #e74c3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
    background: linear-gradient(135deg, #0d2b5e 0%, #1a5faa 40%, #0d2b5e 100%);
    min-height: 100vh;
    color: var(--text-dark);
  }
  .header {
    background: linear-gradient(90deg, rgba(13,43,94,0.95), rgba(26,95,170,0.95), rgba(13,43,94,0.95));
    backdrop-filter: blur(10px);
    padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid rgba(244,123,32,0.6);
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: bold; color: #fff;
    box-shadow: 0 2px 10px rgba(244,123,32,0.5);
  }
  .header-title { color: #fff; }
  .header-title h1 { font-size: 22px; font-weight: 700; letter-spacing: 2px; }
  .header-title p { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .header-time { color: rgba(255,255,255,0.7); font-size: 13px; text-align: right; }
  .header-time span { display: block; color: var(--orange-light); font-size: 15px; font-weight: 600; }
  .main { max-width: 1600px; margin: 0 auto; padding: 24px 24px 32px; }
  .card {
    background: #fff; border-radius: 16px;
    box-shadow: var(--card-shadow); overflow: hidden;
  }
  .card-header {
    padding: 16px 24px 0;
    display: flex; align-items: center; gap: 10px;
  }
  .card-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .card-icon.blue { background: linear-gradient(135deg, var(--blue-mid), var(--blue-light)); color: #fff; }
  .card-icon.orange { background: linear-gradient(135deg, var(--orange), var(--orange-light)); color: #fff; }
  .card-title { font-size: 15px; font-weight: 700; color: var(--blue-dark); flex: 1; }
  .card-badge {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    background: var(--blue-pale); color: var(--blue-mid); font-weight: 600;
  }
  .tab-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab-btn {
    padding: 7px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
    border: none; cursor: pointer; transition: all .2s;
    background: var(--gray-2); color: var(--text-mid);
  }
  .tab-btn.active { background: var(--blue-mid); color: #fff; box-shadow: 0 2px 8px rgba(26,95,170,0.3); }
  .tab-btn:hover:not(.active) { background: var(--blue-pale); color: var(--blue-mid); }
  .sub-tab-row { display: flex; gap: 4px; }
  .sub-tab-btn {
    padding: 5px 14px; border-radius: 14px; font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--gray-2); cursor: pointer; transition: all .2s;
    background: #fff; color: var(--text-mid);
  }
  .sub-tab-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }
  .sub-tab-btn:hover:not(.active) { border-color: var(--orange); color: var(--orange); }
  .tag-row { display: flex; gap: 4px; }
  .tag-btn {
    padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600;
    border: 1.5px solid var(--gray-2); cursor: pointer; transition: all .2s;
    background: #fff; color: var(--text-mid);
  }
  .tag-btn.active { background: var(--blue-mid); color: #fff; border-color: var(--blue-mid); }
  .tag-btn:hover:not(.active) { border-color: var(--blue-light); color: var(--blue-light); }
  .tab-divider { width: 1px; height: 24px; background: var(--gray-2); margin: 0 6px; }
  .kpi-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    padding: 16px 24px 20px;
  }
  .kpi-card {
    background: var(--gray-1); border-radius: 12px; padding: 16px 18px;
    border: 1px solid var(--gray-2);
  }
  .kpi-card.orange-card { background: var(--orange-pale); border-color: rgba(244,123,32,0.2); }
  .kpi-label { font-size: 12px; color: var(--text-light); margin-bottom: 6px; font-weight: 500; }
  .kpi-value { font-size: 26px; font-weight: 800; color: var(--blue-dark); line-height: 1.2; }
  .kpi-value.orange { color: var(--orange); }
  .kpi-sub { font-size: 11px; color: var(--text-light); margin-top: 4px; }
  .kpi-progress-wrap { margin-top: 8px; }
  .kpi-progress-bar {
    height: 6px; background: var(--gray-2); border-radius: 3px; overflow: hidden;
  }
  .kpi-progress-fill {
    height: 100%; border-radius: 3px; transition: width .6s;
  }
  .kpi-progress-fill.blue { background: linear-gradient(90deg, var(--blue-mid), var(--blue-light)); }
  .kpi-progress-fill.orange { background: linear-gradient(90deg, var(--orange), var(--orange-light)); }
  .kpi-progress-pct { font-size: 11px; color: var(--text-light); margin-top: 3px; }
  .row { display: grid; gap: 20px; }
  .row-3col { grid-template-columns: 1fr 1.5fr; }
  .row-2col { grid-template-columns: 1fr 1fr; }
  .donut-container { display: flex; align-items: center; gap: 20px; padding: 16px 24px 20px; }
  .donut-chart-wrap {
    width: 220px; height: 220px; position: relative; flex-shrink: 0;
  }
  .donut-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; pointer-events: none;
  }
  .donut-center-label { font-size: 11px; color: var(--text-light); }
  .donut-center-value { font-size: 18px; font-weight: 800; color: var(--blue-dark); }
  .legend-list { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-name { font-weight: 600; color: var(--text-dark); min-width: 50px; }
  .legend-amt { font-weight: 700; color: var(--blue-dark); text-align: right; min-width: 60px; }
  .legend-pct {
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    min-width: 50px; text-align: center;
  }
  .legend-target { font-size: 11px; color: var(--blue-mid); text-align: right; min-width: 60px; }
  .chart-wrap { padding: 10px 24px 20px; position: relative; }
  .chart-wrap canvas { width: 100% !important; }
  .filter-row {
    display: flex; align-items: center; gap: 10px; padding: 12px 24px;
    flex-wrap: wrap; border-bottom: 1px solid var(--gray-2);
  }
  .filter-label { font-size: 13px; color: var(--text-mid); font-weight: 600; }
  .filter-select {
    padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--gray-2);
    font-size: 13px; color: var(--text-dark); background: #fff; cursor: pointer;
  }
  .filter-input {
    padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--gray-2);
    font-size: 13px; width: 180px; outline: none;
  }
  .filter-input:focus { border-color: var(--blue-light); }
  .filter-clear {
    padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--gray-2);
    font-size: 12px; cursor: pointer; background: #fff; color: var(--text-mid);
    transition: all .2s;
  }
  .filter-clear:hover { border-color: var(--orange); color: var(--orange); }
  .table-wrap { overflow-x: auto; padding: 0; }
  .data-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .data-table th {
    background: var(--gray-1); color: var(--text-mid); font-weight: 600;
    padding: 10px 14px; text-align: center; white-space: nowrap;
    border-bottom: 2px solid var(--gray-2); font-size: 12px;
    position: sticky; top: 0;
  }
  .data-table td {
    padding: 10px 14px; border-bottom: 1px solid var(--gray-2);
    white-space: nowrap; vertical-align: middle; text-align: center;
  }
  /* 终端表列宽 */
  #term-table th:nth-child(1), #term-table td:nth-child(1) { width: 60px; text-align: center; }
  #term-table th:nth-child(2), #term-table td:nth-child(2) { max-width: 200px; text-align: left; overflow: hidden; text-overflow: ellipsis; }
  #term-table th:nth-child(3), #term-table td:nth-child(3) { width: 70px; text-align: center; }
  #term-table th:nth-child(4), #term-table td:nth-child(4) { width: 80px; text-align: center; }
  #term-table th:nth-child(5), #term-table td:nth-child(5) { width: auto; text-align: right; }
  #term-table th:nth-child(6), #term-table td:nth-child(6) { width: auto; text-align: right; }
  #term-table th:nth-child(7), #term-table td:nth-child(7) { width: auto; text-align: right; }
  #term-table th:nth-child(8), #term-table td:nth-child(8) { width: 120px; text-align: center; }
  /* 产品表列宽 */
  #prod-table th:nth-child(1), #prod-table td:nth-child(1) { max-width: 220px; text-align: left; overflow: hidden; text-overflow: ellipsis; }
  #prod-table th:nth-child(2), #prod-table td:nth-child(2) { width: 70px; text-align: center; }
  #prod-table th:nth-child(3), #prod-table td:nth-child(3) { width: auto; text-align: right; }
  #prod-table th:nth-child(4), #prod-table td:nth-child(4) { width: auto; text-align: right; }
  #prod-table th:nth-child(5), #prod-table td:nth-child(5) { width: auto; text-align: right; }
  #prod-table th:nth-child(6), #prod-table td:nth-child(6) { width: auto; text-align: right; }
  #prod-table th:nth-child(7), #prod-table td:nth-child(7) { width: auto; text-align: right; }
  #prod-table th:nth-child(8), #prod-table td:nth-child(8) { width: 80px; text-align: center; }
  .data-table tbody tr:hover { background: var(--blue-pale); }
  .data-table tbody tr.row-active { background: rgba(26,95,170,0.12); }
  .data-table tbody tr.row-active td { border-bottom: 2px solid var(--blue-mid); }
  .num-right { text-align: right; font-variant-numeric: tabular-nums; }
  .num-target { color: var(--blue-mid); font-weight: 600; }
  .num-actual { color: var(--orange); font-weight: 700; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 700; white-space: nowrap;
  }
  .badge-3a { background: #ffeaa7; color: #d68910; }
  .badge-3 { background: #dfe6e9; color: #636e72; }
  .badge-2 { background: #81ecec; color: #00b894; }
  .badge-1 { background: #fab1a0; color: #e17055; }
  .badge-none { background: var(--gray-2); color: var(--text-light); }
  .progress-cell { min-width: 120px; }
  .mini-bar {
    display: inline-block; width: 60px; height: 5px; background: var(--gray-2);
    border-radius: 3px; overflow: hidden; vertical-align: middle; margin-left: 4px;
  }
  .mini-bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--blue-mid), var(--blue-light));
  }
  .mini-bar-fill.over { background: linear-gradient(90deg, var(--orange), var(--orange-light)); }
  .pct-text { font-size: 11px; font-weight: 700; }
  .pct-text.over { color: var(--orange); }
  .pct-text.normal { color: var(--blue-mid); }
  .pagination { display: flex; align-items: center; gap: 6px; margin: 14px 24px; justify-content: flex-end; }
  .page-info { font-size: 13px; color: var(--text-mid); margin-right: 8px; }
  .page-btn {
    padding: 5px 12px; border-radius: 7px; border: 1.5px solid var(--gray-2);
    font-size: 13px; cursor: pointer; background: #fff; color: var(--text-mid); transition: all .2s;
  }
  .page-btn:hover { background: var(--blue-pale); border-color: var(--blue-light); color: var(--blue-mid); }
  .page-btn.active { background: var(--blue-mid); color: #fff; border-color: var(--blue-mid); }
  .page-btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
  @media (max-width: 1100px) {
    .row-3col, .row-2col { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .donut-container { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-logo">渝</div>
    <div class="header-title">
      <h1>重庆长寿公司看板</h1>
      <p>区县终端销售数据分析平台 · 2026年</p>
    </div>
  </div>
  <div class="header-time">数据截至<span id="cur-time">--</span></div>
</div>
<div class="main">
  <!-- 顶部区域切片 -->
  <div style="margin-bottom:16px;display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--card);border-radius:10px;">
    <span style="font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;">📍 区域</span>
    <div class="sub-tab-row" id="region-tabs" style="gap:8px;">
      <button class="sub-tab-btn active" onclick="switchRegion('全部',this)">全部</button>
      <button class="sub-tab-btn" onclick="switchRegion('垫江',this)">垫江</button>
      <button class="sub-tab-btn" onclick="switchRegion('涪陵',this)">涪陵</button>
      <button class="sub-tab-btn" onclick="switchRegion('丰都',this)">丰都</button>
      <button class="sub-tab-btn" onclick="switchRegion('长寿',this)">长寿</button>
    </div>
  </div>
  <!-- 模块一 -->
  <div style="margin-bottom:20px;">
    <div class="card">
      <div class="card-header">
        <div class="card-icon blue">📊</div>
        <span class="card-title">销售概览</span>
        <span class="card-badge">实时汇总</span>
      </div>
      <div style="padding:12px 24px 0;">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <div class="tab-row" id="cat-tabs">
            <button class="tab-btn active" onclick="switchCat('全部',this)">全部汇总</button>
            <button class="tab-btn" onclick="switchCat('品牌品',this)">品牌品</button>
            <button class="tab-btn" onclick="switchCat('代理品',this)">代理品</button>
            <button class="tab-btn" onclick="switchCat('商销品',this)">商销品</button>
          </div>
          <div class="tab-divider"></div>
          <div class="sub-tab-row" id="metric-tabs">
            <button class="sub-tab-btn active" onclick="switchMetric('金额',this)">金额</button>
            <button class="sub-tab-btn" onclick="switchMetric('终端数',this)">终端数</button>
          </div>

        </div>
      </div>
      <div class="kpi-grid" id="kpi-grid"></div>
    </div>
  </div>
  <!-- 模块二 + 三 -->
  <div class="row row-3col" style="margin-bottom:20px;">
    <div class="card">
      <div class="card-header">
        <div class="card-icon orange">🍩</div>
        <span class="card-title">26年销售进度(按金额)</span>
        <span class="card-badge">按品类</span>
      </div>
      <div class="donut-container">
        <div class="donut-chart-wrap">
          <canvas id="donut-chart"></canvas>
          <div class="donut-center">
            <div class="donut-center-label">累计金额</div>
            <div class="donut-center-value" id="donut-total">--</div>
            <div class="donut-center-label" style="margin-top:6px;">目标金额</div>
            <div class="donut-center-value" id="donut-target" style="font-size:14px;color:#f47b20;">--</div>
            <div class="donut-center-label" style="margin-top:4px;">完成率</div>
            <div class="donut-center-value" id="donut-rate" style="font-size:16px;color:#e74c3c;">--</div>
          </div>
        </div>
        <div class="legend-list" id="donut-legend"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-icon blue">📈</div>
        <span class="card-title">销售进度（按药品）</span>
        <span class="card-badge" id="bar3-badge">品牌品</span>
      </div>
      <div style="padding:12px 24px 0;">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <div class="tab-row" id="bar-tabs">
            <button class="tab-btn active" onclick="switchBarCat('品牌品',this)">品牌品</button>
            <button class="tab-btn" onclick="switchBarCat('代理品',this)">代理品</button>
            <button class="tab-btn" onclick="switchBarCat('商销品',this)">商销品</button>
          </div>
          <div class="tab-divider"></div>
          <div class="tag-row" id="tag-tabs">
            <button class="tag-btn active" onclick="switchTag('全部',this)">全部</button>
            <button class="tag-btn" onclick="switchTag('勾选品',this)">勾选品</button>
            <button class="tag-btn" onclick="switchTag('非勾选品',this)">非勾选品</button>
          </div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="bar-chart"></canvas></div>
    </div>
  </div>
  <!-- 模块四+五 合并 -->
  <div class="card" style="margin-bottom:20px;">
    <div class="card-header" style="border-bottom:none;padding-bottom:0;">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="card-icon orange">📋</div>
          <span class="card-title">销售明细</span>
        </div>
        <div class="sub-tab-row" id="table-tabs" style="gap:4px;">
          <button class="sub-tab-btn active" onclick="switchTable('terminal',this)">终端销售</button>
          <button class="sub-tab-btn" onclick="switchTable('product',this)">产品销售</button>
        </div>
        <span class="card-badge" id="term-count-badge" style="display:inline;">共 0 家</span>
        <span class="card-badge" id="prod-count-badge" style="display:none;">共 0 个</span>
      </div>
    </div>
    <!-- 统一筛选行 -->
    <div class="filter-row" style="padding:8px 24px;">
      <span class="filter-label">🔍</span>
      <select class="filter-select" id="filter-level" onchange="applyFilter()">
        <option value="">全部等级</option><option>三甲</option><option>三级</option><option>二级</option><option>一级</option><option>其它</option>
      </select>
      <input class="filter-input" id="filter-name" placeholder="搜索终端名称..." oninput="applyFilter()" style="flex:1;min-width:200px;" />
      <button class="filter-clear" onclick="clearFilter()">清除</button>
    </div>
    <!-- 终端销售面板 -->
    <div id="terminal-panel">
      <div class="table-wrap">
        <table class="data-table" id="term-table">
          <thead><tr>
            <th>区县</th><th>终端名称</th><th>医院等级</th><th>在销产品数</th>
            <th>26年目标销售金额（无税）</th>
            <th>26年累计销售金额</th><th>预估销售费用</th><th>完成率</th>
          </tr></thead>
          <tbody id="term-tbody"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
    <!-- 产品销售面板 -->
    <div id="product-panel" style="display:none;">
      <div id="prod-filter-hint" style="display:none;margin-bottom:8px;padding:8px 14px;background:rgba(26,95,170,0.08);border-radius:8px;font-size:13px;color:var(--blue-mid);cursor:pointer" onclick="clearTerminalSelect()">
        <span id="prod-filter-text"></span>&nbsp;&nbsp;<span style="font-size:12px;opacity:0.7">点击查看全部产品 →</span>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="prod-table">
          <thead><tr>
            <th>产品名称</th><th>分类</th><th>年市场规模(销量)</th><th>年勾选折合量</th><th>2025年销量</th><th>当前销量(1-3月)</th><th>目标销量</th><th>费用率</th>
          </tr></thead>
          <tbody id="prod-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

      '<div class="kpi-card"><div class="kpi-label">\u5728\u9500\u7ec8\u7aef\u6570</div><div class="kpi-value">'+d.terminals+'</div><div class="kpi-sub">'+(curRegion==='\u5168\u90e8'?'\u5f53\u524d\u54c1\u7c7b\u8986\u76d6\u7ec8\u7aef':curRegion+'\u533a\u57df\u5728\u9500\u7ec8\u7aef')+'</div></div>'+
      '<div class="kpi-card"><div class="kpi-label">'+(curRegion==='\u5168\u90e8'?'\u5168\u90e8\u7ec8\u7aef\u603b\u6570':curRegion+'\u7ec8\u7aef\u603b\u6570')+'</div><div class="kpi-value">'+totalTerminals+'</div><div class="kpi-sub">\u516c\u53f8\u7ba1\u8f96\u7ec8\u7aef\u603b\u6570</div></div>'+
      '<div class="kpi-card"><div class="kpi-label">\u7ec8\u7aef\u8986\u76d6\u7387</div><div class="kpi-value">'+Math.round(d.terminals/totalTerminals*100)+'%</div><div class="kpi-progress-wrap"><div class="kpi-progress-bar"><div class="kpi-progress-fill blue" style="width:'+Math.round(d.terminals/totalTerminals*100)+'%"></div></div><div class="kpi-progress-pct">\u7ec8\u7aef\u8986\u76d6\u7387</div></div></div>'+
      '<div class="kpi-card orange-card"><div class="kpi-label">\u5728\u9500\u4ea7\u54c1\u6570</div><div class="kpi-value orange">'+d.products+'</div><div class="kpi-sub">'+(curRegion==='\u5168\u90e8'?'\u5f53\u524d\u54c1\u7c7b\u4ea7\u54c1':curRegion+'\u533a\u57df\u4ea7\u54c1')+'</div></div>';
  } else {
    var allP=SUMMARY['\u5168\u90e8'].products;
    grid.innerHTML=
      '<div class="kpi-card"><div class="kpi-label">\u5728\u9500\u4ea7\u54c1\u6570</div><div class="kpi-value">'+d.products+'</div><div class="kpi-sub">\u5f53\u524d\u54c1\u7c7b</div></div>'+
      '<div class="kpi-card"><div class="kpi-label">\u5168\u54c1\u7c7b\u4ea7\u54c1\u603b\u6570</div><div class="kpi-value">'+allP+'</div><div class="kpi-sub">\u54c1\u724c\u54c1 + \u4ee3\u7406\u54c1 + \u5546\u9500\u54c1</div></div>'+
      '<div class="kpi-card"><div class="kpi-label">\u4ea7\u54c1\u5360\u6bd4</div><div class="kpi-value">'+Math.round(d.products/allP*100)+'%</div><div class="kpi-progress-wrap"><div class="kpi-progress-bar"><div class="kpi-progress-fill blue" style="width:'+Math.round(d.products/allP*100)+'%"></div></div><div class="kpi-progress-pct">\u5360\u5168\u54c1\u7c7b\u6bd4\u4f8b</div></div></div>'+
      '<div class="kpi-card orange-card"><div class="kpi-label">\u8986\u76d6\u7ec8\u7aef\u6570</div><div class="kpi-value orange">'+d.terminals+'</div><div class="kpi-sub">\u5f53\u524d\u54c1\u7c7b\u7ec8\u7aef</div></div>';
  }
}

function switchCat(cat,btn){ curCat=cat; document.querySelectorAll('#cat-tabs .tab-btn').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active'); renderKPI(); }
function switchMetric(m,btn){ curMetric=m; document.querySelectorAll('#metric-tabs .sub-tab-btn').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active'); renderKPI(); }
function switchRegion(r,btn){ curRegion=r; document.querySelectorAll('#region-tabs .sub-tab-btn').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active'); renderKPI(); renderDonut(); renderBar(); applyFilter(); renderProductTable(); }

// Donut
var donutChart;
function renderDonut(){
  var cats=['品牌品','代理品','商销品'];
  var donutSrc=curRegion!=='全部'?REGION_DONUT_DATA[curRegion]:DONUT_DATA;
  var vals=cats.map(function(c){return donutSrc[c]||0;});
  var total=vals.reduce(function(a,b){return a+b;},0);
  var targetTotal=curRegion!=='全部'?REGION_SUMMARY[curRegion].target26:cats.reduce(function(s,c){return s+(SUMMARY[c]?SUMMARY[c].target26:0);},0);
  var rate=targetTotal>0?Math.round(total/targetTotal*10000)/100:0;
  var colors=['#1a5faa','#f47b20','#3b8cde'];
  var lightColors=['rgba(26,95,170,0.15)','rgba(244,123,32,0.15)','rgba(59,140,222,0.15)'];
  document.getElementById('donut-total').textContent=fmt(total);
  document.getElementById('donut-target').textContent=fmt(targetTotal);
  document.getElementById('donut-rate').textContent=rate+'%';
  var targetVals=cats.map(function(c){
    if(curRegion!=='全部'){
      var bd=REGION_BAR_DATA[curRegion]&&REGION_BAR_DATA[curRegion][c];
      return bd?bd.target.reduce(function(a,b){return a+b;},0):0;
    }
    return SUMMARY[c]?SUMMARY[c].target26:0;
  });
  document.getElementById('donut-legend').innerHTML=cats.map(function(c,i){
    var p=targetVals[i]>0?Math.round(vals[i]/targetVals[i]*100):0;
    return'<div class="legend-item"><div class="legend-dot" style="background:'+colors[i]+'"></div><span class="legend-name">'+c+'</span><span class="legend-amt">'+fmt(vals[i])+'</span><span class="legend-pct" style="background:'+lightColors[i]+';color:'+colors[i]+'">'+p+'%</span></div>';
  }).join('');
  if(donutChart)donutChart.destroy();
  donutChart=new Chart(document.getElementById('donut-chart'),{
    type:'doughnut',
    data:{labels:cats,datasets:[{data:vals,backgroundColor:colors,borderColor:'#fff',borderWidth:3,hoverOffset:8}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return' '+ctx.label+': \u00a5'+ctx.raw.toLocaleString('zh-CN',{maximumFractionDigits:0});}}}}}
  });
}

// Bar
var barChart;
function getFilteredBarData(){
  var barSrc=curRegion!=='全部'?REGION_BAR_DATA[curRegion]:BAR_DATA;
  var d=barSrc[curBarCat];
  if(!d) return {labels:[],target:[],actual:[],tag:[]};
  if(curTag==='全部') return d;
  var idx=d.tag.map(function(t,i){return t===curTag?i:-1;}).filter(function(i){return i>=0;});
  return {labels:idx.map(function(i){return d.labels[i];}),target:idx.map(function(i){return d.target[i];}),actual:idx.map(function(i){return d.actual[i];}),tag:idx.map(function(i){return d.tag[i];})};
}
function renderBar(){
  var d=getFilteredBarData();
  document.getElementById('bar3-badge').textContent=curBarCat+(curTag==='\u5168\u90e8'?'':' \u00b7 '+curTag);
  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById('bar-chart'),{
    type:'bar',
    data:{labels:d.labels,datasets:[{label:'26\u5e74\u76ee\u6807\u91d1\u989d\uff08\u65e0\u7a0e\uff09',data:d.target,backgroundColor:'rgba(26,95,170,0.85)',borderRadius:4,borderSkipped:false},{label:'26\u5e74\u7d2f\u8ba1\u9500\u552e\u91d1\u989d',data:d.actual,backgroundColor:'rgba(244,123,32,0.85)',borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{position:'top',labels:{font:{size:12},padding:16,boxWidth:12}},tooltip:{callbacks:{label:function(ctx){return' '+ctx.dataset.label+': \u00a5'+ctx.raw.toLocaleString('zh-CN',{maximumFractionDigits:0});}}}},scales:{y:{grid:{display:false},ticks:{font:{size:11}}},x:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{font:{size:11},callback:function(v){return v>=1e6?(v/1e4).toFixed(0)+'\u4e07':v>=1e4?(v/1e4).toFixed(1)+'\u4e07':v;}}}}}
  });
}
function switchBarCat(cat,btn){ curBarCat=cat; document.querySelectorAll('#bar-tabs .tab-btn').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active'); renderBar(); }
function switchTag(tag,btn){ curTag=tag; document.querySelectorAll('#tag-tabs .tag-btn').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active'); renderBar(); }

// Table
var LEVEL_ORDER = {'\u4e09\u7532':1,'\u4e09\u7ea7':2,'\u4e8c\u7ea7':3,'\u4e00\u7ea7':4,'\u5176\u5b83':5};
function sortTerms(terms){
  return terms.slice().sort(function(a,b){
    var la=LEVEL_ORDER[a.level]||9, lb=LEVEL_ORDER[b.level]||9;
    if(la!==lb) return la-lb;
    return a.name.localeCompare(b.name,'zh-CN');
  });
}

function applyFilter(){
  var lv=document.getElementById('filter-level').value;
  var kw=document.getElementById('filter-name').value.trim();
  var terms=TERMINALS.filter(function(t){if(curRegion!=='全部'&&t.quxian!==curRegion)return false;if(lv&&t.level!==lv)return false;if(kw&&!t.name.includes(kw))return false;return true;});
  filteredTerms=sortTerms(terms);
  curPage=1; renderTable(); renderProductTable();
}
function clearFilter(){ document.getElementById('filter-level').value=''; document.getElementById('filter-name').value=''; applyFilter(); }
function switchTable(tab,btn){
  document.querySelectorAll('#table-tabs .sub-tab-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  if(tab==='terminal'){
    document.getElementById('terminal-panel').style.display='';
    document.getElementById('product-panel').style.display='none';
    document.getElementById('term-count-badge').style.display='inline';
    document.getElementById('prod-count-badge').style.display='none';
    if(selectedTerminal){selectedTerminal=null;document.getElementById('filter-name').value='';applyFilter();}
  }else{
    document.getElementById('terminal-panel').style.display='none';
    document.getElementById('product-panel').style.display='';
    document.getElementById('term-count-badge').style.display='none';
    document.getElementById('prod-count-badge').style.display='inline';
    renderProductTable();
  }
}

function renderTable(){
  var total=filteredTerms.length;
  var totalPages=Math.ceil(total/PAGE_SIZE);
  var start=(curPage-1)*PAGE_SIZE;
  var pageData=filteredTerms.slice(start,start+PAGE_SIZE);
  document.getElementById('term-count-badge').textContent='\u5171 '+total+' \u5bb6';
  document.getElementById('term-tbody').innerHTML=pageData.map(function(t){
    var p=pct(t.actual26,t.target26);
    var isOver=p>100;
    var isActive=selectedTerminal===t.name;
    return'<tr class="'+(isActive?'row-active':'')+'" style="cursor:pointer" onclick="clickTerminal(\''+t.name.replace(/'/g,"\\'")+'\')"><td>'+(t.quxian||'\u2014')+'</td><td class="terminal-name">'+t.name+'</td><td>'+levelBadge(t.level)+'</td><td class="num-right">'+t.products+'</td><td class="num-right num-target">'+fmtFull(t.target26)+'</td><td class="num-right num-actual">'+fmtFull(t.actual26)+'</td><td class="num-right" style="color:var(--text-mid)">'+(t.cost>0?fmtFull(t.cost):'\u2014')+'</td><td class="progress-cell"><span class="pct-text '+(isOver?'over':'normal')+'">'+(p>999?'\u2014':p+'%')+'</span><div class="mini-bar"><div class="mini-bar-fill '+(isOver?'over':'')+'" style="width:'+Math.min(p,100)+'%"></div></div></td></tr>';
  }).join('');
  var pagi=document.getElementById('pagination');
  var html='<span class="page-info">\u7b2c '+(start+1)+'\u2013'+Math.min(start+PAGE_SIZE,total)+' \u6761\uff0c\u5171 '+total+' \u6761</span>';
  html+='<button class="page-btn" onclick="goPage('+(curPage-1)+')" '+(curPage<=1?'disabled':'')+'>\u2039</button>';
  var pages=[]; for(var i=1;i<=totalPages;i++){if(i===1||i===totalPages||Math.abs(i-curPage)<=1)pages.push(i);else if(pages[pages.length-1]!=='\u2026')pages.push('\u2026');}
  pages.forEach(function(p){if(p==='\u2026')html+='<button class="page-btn" disabled>\u2026</button>';else html+='<button class="page-btn '+(p===curPage?'active':'')+'" onclick="goPage('+p+')">'+p+'</button>';});
  html+='<button class="page-btn" onclick="goPage('+(curPage+1)+')" '+(curPage>=totalPages?'disabled':'')+'>\u203a</button>';
  pagi.innerHTML=html;
}
function goPage(p){ var total=filteredTerms.length; var totalPages=Math.ceil(total/PAGE_SIZE); if(p<1||p>totalPages)return; curPage=p; renderTable(); }

function updateTime(){ var now=new Date(); document.getElementById('cur-time').textContent=now.getFullYear()+'\u5e74'+(now.getMonth()+1)+'\u6708'+now.getDate()+'\u65e5'; }

// Product Table
var catBadge = function(c) { if(c==='\u54c1\u724c\u54c1')return'<span class="badge badge-3">'+c+'</span>'; if(c==='\u4ee3\u7406\u54c1')return'<span class="badge badge-2">'+c+'</span>'; return'<span class="badge badge-none">'+c+'</span>'; };
function fmtQty(n){ if(!n&&n!==0)return'\u2014'; if(Math.abs(n)>=1e4)return(n/1e4).toFixed(1)+'\u4e07'; return n.toLocaleString('zh-CN',{maximumFractionDigits:0}); }
function renderProductTable(){
  var src=curRegion!=='全部'?REGION_PRODUCT_DATA[curRegion]:PRODUCT_DATA;
  var termDrugs=null;
  if(selectedTerminal){
    termDrugs=[];
    Object.keys(TERM_PRODUCTS).forEach(function(t){
      if(t===selectedTerminal){
        TERM_PRODUCTS[t].forEach(function(d){if(termDrugs.indexOf(d)===-1)termDrugs.push(d);});
      }
    });
  }else{
    var termKw=document.getElementById('filter-name').value.trim();
    if(termKw){
      termDrugs=[];
      Object.keys(TERM_PRODUCTS).forEach(function(t){
        if(t.includes(termKw)){
          TERM_PRODUCTS[t].forEach(function(d){if(termDrugs.indexOf(d)===-1)termDrugs.push(d);});
        }
      });
    }
  }
  var data=src.filter(function(p){if(termDrugs&&termDrugs.length>0&&termDrugs.indexOf(p.drug)===-1)return false;return true;});
  var label=selectedTerminal?'（终端: '+selectedTerminal+'）':(termKw?'（匹配终端: '+termKw+'）':'');
  document.getElementById('prod-count-badge').textContent='\u5171 '+data.length+' \u4e2a'+label;
  var hintEl=document.getElementById('prod-filter-hint');
  if(selectedTerminal){hintEl.style.display='';document.getElementById('prod-filter-text').textContent='📌 当前显示：'+selectedTerminal+' 的产品';}else{hintEl.style.display='none';}
  document.getElementById('prod-tbody').innerHTML=data.map(function(p){
    return'<tr><td class="terminal-name">'+p.drug+'</td><td>'+catBadge(p.cat)+'</td><td class="num-right">'+(p.market_scale?p.market_scale.toLocaleString('zh-CN',{maximumFractionDigits:0}):'\u2014')+'</td><td class="num-right">'+(p.checked_qty?p.checked_qty.toLocaleString('zh-CN',{maximumFractionDigits:0}):'\u2014')+'</td><td class="num-right" style="color:var(--text-mid)">'+(p.sales_25?p.sales_25.toLocaleString('zh-CN',{maximumFractionDigits:0}):'\u2014')+'</td><td class="num-right num-actual">'+(p.current_sales?p.current_sales.toLocaleString('zh-CN',{maximumFractionDigits:0}):'\u2014')+'</td><td class="num-right num-target">'+(p.target_qty?p.target_qty.toLocaleString('zh-CN',{maximumFractionDigits:0}):'\u2014')+'</td><td class="num-right" style="color:'+(p.costRate>30?'var(--orange)':'var(--text-mid)')+'">'+(p.costRate>0?Math.round(p.costRate)+'%':'\u2014')+'</td></tr>';
  }).join('');
}

// TERM_PRODUCTS data removed (product data is in PRODUCT_DATA)

// Init
filteredTerms = sortTerms(TERMINALS.slice());
document.addEventListener('DOMContentLoaded', function(){ updateTime(); renderKPI(); renderDonut(); renderBar(); renderTable(); renderProductTable(); });
</script>
</body>
